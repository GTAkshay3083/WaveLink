name: wavelink
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Networking
  connectivity_plus: ^7.0.0
  network_info_plus: ^6.1.4

  # Permissions
  permission_handler: ^12.0.1

  # Device Information
  device_info_plus: ^12.1.0

  # Persistent Storage
  shared_preferences: ^2.5.3

  # Unique IDs
  uuid: ^4.5.1

  # Audio Playback
  just_audio: ^0.10.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true